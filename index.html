<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=div, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Decision Maker</title>
</head>

<body>
    <header>
        <h1>DECISION MAKER</h1>
    </header>
    <div id="main-content">
        <div id="coin-box">
            <!-- Coin Animation -->

            <div id="coin">
                <div id="coin-head">
                    <p>HEADS</p>
                </div>
            <div id="coin-tail">
                <p>TAILS</p>
            </div>
            </div>

        </div>
        <div id="options-box">
            <!-- Options Entry -->

            <h2 id="enter-op-heading">Enter Your Options Here:</h2>

            <form id="form" action="">
                <label class="form-item" for="heads">Assign to Heads:</label>
                <input class="form-item" type="text" id="heads">
                <label class="form-item" for="tails">Assign to Tails:</label>
                <input class="form-item" type="text" id="tails">
            </form>

            <button id="flip-btn">Flip</button>

        </div>
    </div>
    <footer>
        The Psuedocoder
    </footer>
</body>

</html>
